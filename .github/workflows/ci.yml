name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  mobile-android-release:
    name: Mobile Android release gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create CI release signing key
        env:
          ANDROID_KEYSTORE_PASSWORD: ci-release-password
          ANDROID_KEY_PASSWORD: ci-release-password
        run: |
          keytool -genkeypair \
            -storetype PKCS12 \
            -keystore "$RUNNER_TEMP/toposonics-ci-release.p12" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias ci-release \
            -keypass "$ANDROID_KEY_PASSWORD" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 1 \
            -dname "CN=TopoSonics CI,O=TopoSonics,C=US"

      - name: Check Android release prerequisites
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/toposonics-ci-release.p12
          ANDROID_KEYSTORE_PASSWORD: ci-release-password
          ANDROID_KEY_ALIAS: ci-release
          ANDROID_KEY_PASSWORD: ci-release-password
        run: pnpm release:check:mobile -- --platform=android

      - name: Build Android release bundle
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/toposonics-ci-release.p12
          ANDROID_KEYSTORE_PASSWORD: ci-release-password
          ANDROID_KEY_ALIAS: ci-release
          ANDROID_KEY_PASSWORD: ci-release-password
        run: pnpm build:mobile:android:release
